<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETJ Server Monitor</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #07080b;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.container {
    max-width: 1450px;
    margin: auto;
    padding: 35px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
}

h1 {
    margin: 0;
    font-size: 32px;
}

.subtitle {
    color: #8e8e93;
    margin-top: 5px;
}

.live {
    color: #30d158;
    font-weight: 700;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 24px;
    padding: 25px;
}

.card h2 {
    margin: 0;
    color: #98989f;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.value {
    font-size: 52px;
    font-weight: 700;
    margin: 15px 0;
}

.details {
    color: #98989f;
    margin-top: 14px;
}

.bar {
    width: 100%;
    height: 8px;
    background: #24252a;
    border-radius: 20px;
    overflow: hidden;
}

.fill {
    width: 0%;
    height: 100%;
    background: white;
    border-radius: 20px;
    transition: width .5s ease;
}

.wide {
    grid-column: span 2;
}

.full {
    grid-column: span 3;
}

.drive {
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.08);
}

.drive:last-child {
    border-bottom: none;
}

.drive-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.network-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.network-value {
    font-size: 36px;
    font-weight: 700;
    margin-top: 10px;
}

.jellyfin {
    color: #a970ff;
}

@media(max-width: 800px) {
    .container {
        padding: 20px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .wide,
    .full {
        grid-column: span 1;
    }

    .network-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
    <div>
        <h1>ETJ Server Monitor</h1>
        <div class="subtitle" id="hostname">Connecting...</div>
    </div>

    <div class="live">● LIVE</div>
</header>

<div class="grid">

<div class="card">
    <h2>🧠 CPU</h2>
    <div class="value"><span id="cpu">0</span>%</div>

    <div class="bar">
        <div class="fill" id="cpuBar"></div>
    </div>

    <div class="details" id="cpuDetails">Loading...</div>
</div>


<div class="card">
    <h2>🎮 GPU</h2>
    <div class="value"><span id="gpu">--</span>%</div>

    <div class="bar">
        <div class="fill" id="gpuBar"></div>
    </div>

    <div class="details" id="gpuDetails">Detecting GPU...</div>
</div>


<div class="card">
    <h2>💾 RAM</h2>
    <div class="value"><span id="ram">0</span>%</div>

    <div class="bar">
        <div class="fill" id="ramBar"></div>
    </div>

    <div class="details" id="ramDetails">Loading...</div>
</div>


<div class="card wide">
    <h2>💿 Storage</h2>
    <div id="storage">Loading drives...</div>
</div>


<div class="card">
    <h2>🌐 Network</h2>

    <div class="network-grid">

        <div>
            <div class="details">DOWNLOAD</div>
            <div class="network-value" id="download">0 Mbps</div>
        </div>

        <div>
            <div class="details">UPLOAD</div>
            <div class="network-value" id="upload">0 Mbps</div>
        </div>

    </div>
</div>


<div class="card full">
    <h2 class="jellyfin">🎬 Jellyfin</h2>

    <div class="value jellyfin">COMING NEXT</div>

    <div class="details">
        Server status • Now Playing • Transcoding
    </div>
</div>

</div>
</div>


<script>

function bytesToGB(bytes) {
    return (bytes / 1024 / 1024 / 1024).toFixed(1);
}

function bytesToMbps(bytes) {
    return ((bytes * 8) / 1000000).toFixed(2);
}


async function updateStats() {

    try {

        const response = await fetch("/api/system");
        const data = await response.json();


        // CPU

        const cpu = Math.round(data.cpu.usage);

        document.getElementById("cpu").textContent = cpu;
        document.getElementById("cpuBar").style.width = cpu + "%";

        document.getElementById("cpuDetails").textContent =
            data.cpu.cores + " cores • " +
            data.cpu.threads + " threads • " +
            Math.round(data.cpu.frequency) + " MHz";


        // GPU

        if (data.gpu.available) {

            const gpu = Math.round(data.gpu.usage);

            document.getElementById("gpu").textContent = gpu;
            document.getElementById("gpuBar").style.width = gpu + "%";

            document.getElementById("gpuDetails").textContent =
                data.gpu.name +
                " • " +
                data.gpu.temperature + "°C • " +
                data.gpu.memory_used + " / " +
                data.gpu.memory_total + " MB VRAM";

        } else {

            document.getElementById("gpu").textContent = "--";

            document.getElementById("gpuDetails").textContent =
                data.gpu.name;

        }


        // RAM

        const ram = Math.round(data.ram.usage);

        document.getElementById("ram").textContent = ram;
        document.getElementById("ramBar").style.width = ram + "%";

        document.getElementById("ramDetails").textContent =
            bytesToGB(data.ram.used) +
            " GB / " +
            bytesToGB(data.ram.total) +
            " GB";


        // NETWORK

        document.getElementById("download").textContent =
            bytesToMbps(data.network.download_speed) + " Mbps";

        document.getElementById("upload").textContent =
            bytesToMbps(data.network.upload_speed) + " Mbps";


        // STORAGE

        const storage = document.getElementById("storage");

        storage.innerHTML = "";

        data.storage.forEach(drive => {

            const driveElement = document.createElement("div");

            driveElement.className = "drive";

            driveElement.innerHTML = `
                <div class="drive-top">
                    <strong>${drive.device}</strong>

                    <span>
                        ${bytesToGB(drive.used)} GB /
                        ${bytesToGB(drive.total)} GB
                    </span>
                </div>

                <div class="bar">
                    <div
                        class="fill"
                        style="width:${drive.usage}%">
                    </div>
                </div>

                <div class="details">
                    ${drive.usage}% used •
                    ${bytesToGB(drive.free)} GB free
                </div>
            `;

            storage.appendChild(driveElement);

        });


        // WINDOWS

        document.getElementById("hostname").textContent =
            data.windows.hostname +
            " • " +
            data.windows.processes +
            " processes";

    }

    catch(error) {

        console.error("Monitor error:", error);

    }

}


updateStats();

setInterval(updateStats, 2000);

</script>

</body>
</html>
