<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETJ Server Monitor</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #07080b;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.container {
    max-width: 1450px;
    margin: auto;
    padding: 35px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
}

h1 { margin: 0; font-size: 32px; }

.subtitle, .details {
    color: #98989f;
    margin-top: 8px;
}

.live { color: #30d158; font-weight: 700; }

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 24px;
    padding: 25px;
}

.card h2 {
    margin: 0;
    color: #98989f;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.value {
    font-size: 52px;
    font-weight: 700;
    margin: 15px 0;
}

.bar {
    width: 100%;
    height: 8px;
    background: #24252a;
    border-radius: 20px;
    overflow: hidden;
}

.fill {
    width: 0;
    height: 100%;
    background: white;
    border-radius: 20px;
    transition: width .5s ease;
}

.wide { grid-column: span 2; }
.full { grid-column: span 3; }

.drive, .stream {
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,.08);
}

.drive:last-child, .stream:last-child {
    border-bottom: none;
}

.drive-top, .stream-top {
    display: flex;
    justify-content: space-between;
    gap: 15px;
}

.network-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.network-value {
    font-size: 36px;
    font-weight: 700;
    margin-top: 10px;
}

.jellyfin { color: #a970ff; }
.good { color: #30d158; }
.bad { color: #ff453a; }
.warning { color: #ffd60a; }

.stream-title {
    font-size: 24px;
    font-weight: 700;
}

.method {
    font-weight: 700;
    margin-top: 12px;
}

.progress {
    margin-top: 15px;
}

@media(max-width: 800px) {
    .container { padding: 20px; }
    .grid { grid-template-columns: 1fr; }
    .wide, .full { grid-column: span 1; }
    .network-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">

<header>
    <div>
        <h1>ETJ Server Monitor</h1>
        <div class="subtitle" id="hostname">Connecting...</div>
    </div>
    <div class="live">● LIVE</div>
</header>

<div class="grid">

<div class="card">
    <h2>🧠 CPU</h2>
    <div class="value"><span id="cpu">0</span>%</div>
    <div class="bar"><div class="fill" id="cpuBar"></div></div>
    <div class="details" id="cpuDetails">Loading...</div>
</div>

<div class="card">
    <h2>🎮 GPU</h2>
    <div class="value"><span id="gpu">--</span>%</div>
    <div class="bar"><div class="fill" id="gpuBar"></div></div>
    <div class="details" id="gpuDetails">Detecting GPU...</div>
</div>

<div class="card">
    <h2>💾 RAM</h2>
    <div class="value"><span id="ram">0</span>%</div>
    <div class="bar"><div class="fill" id="ramBar"></div></div>
    <div class="details" id="ramDetails">Loading...</div>
</div>

<div class="card wide">
    <h2>💿 Storage</h2>
    <div id="storage">Loading drives...</div>
</div>

<div class="card">
    <h2>🌐 Network</h2>
    <div class="network-grid">
        <div>
            <div class="details">DOWNLOAD</div>
            <div class="network-value" id="download">0 Mbps</div>
        </div>
        <div>
            <div class="details">UPLOAD</div>
            <div class="network-value" id="upload">0 Mbps</div>
        </div>
    </div>
</div>

<div class="card full">
    <h2 class="jellyfin">🎬 Jellyfin</h2>
    <div class="value" id="jellyfinStatus">CONNECTING</div>
    <div class="details" id="jellyfinDetails">Checking Jellyfin...</div>
</div>

<div class="card full">
    <h2>🍿 Now Playing</h2>
    <div id="nowPlaying">
        <div class="details">Checking active streams...</div>
    </div>
</div>

</div>
</div>

<script>
function bytesToGB(bytes) {
    return (bytes / 1024 / 1024 / 1024).toFixed(1);
}

function bytesToMbps(bytes) {
    return ((bytes * 8) / 1000000).toFixed(2);
}

async function updateSystem() {
    try {
        const response = await fetch("/api/system");
        const data = await response.json();

        const cpu = Math.round(data.cpu.usage);
        cpuBar.style.width = cpu + "%";
        document.getElementById("cpu").textContent = cpu;

        cpuDetails.textContent =
            `${data.cpu.cores} cores • ${data.cpu.threads} threads • ${Math.round(data.cpu.frequency)} MHz`;

        if (data.gpu.available) {
            const gpu = Math.round(data.gpu.usage);
            document.getElementById("gpu").textContent = gpu;
            gpuBar.style.width = gpu + "%";

            gpuDetails.textContent =
                `${data.gpu.name} • ${data.gpu.temperature}°C • ${data.gpu.memory_used} / ${data.gpu.memory_total} MB VRAM`;
        } else {
            document.getElementById("gpu").textContent = "--";
            gpuDetails.textContent = data.gpu.name;
        }

        const ram = Math.round(data.ram.usage);
        document.getElementById("ram").textContent = ram;
        ramBar.style.width = ram + "%";

        ramDetails.textContent =
            `${bytesToGB(data.ram.used)} GB / ${bytesToGB(data.ram.total)} GB`;

        download.textContent =
            bytesToMbps(data.network.download_speed) + " Mbps";

        upload.textContent =
            bytesToMbps(data.network.upload_speed) + " Mbps";

        storage.innerHTML = "";

        data.storage.forEach(drive => {
            storage.innerHTML += `
                <div class="drive">
                    <div class="drive-top">
                        <strong>${drive.device}</strong>
                        <span>${bytesToGB(drive.used)} GB / ${bytesToGB(drive.total)} GB</span>
                    </div>

                    <div class="bar">
                        <div class="fill" style="width:${drive.usage}%"></div>
                    </div>

                    <div class="details">
                        ${drive.usage}% used • ${bytesToGB(drive.free)} GB free
                    </div>
                </div>
            `;
        });

        hostname.textContent =
            `${data.windows.hostname} • ${data.windows.processes} processes`;

    } catch (error) {
        console.error(error);
    }
}

async function updateJellyfin() {
    try {
        const response = await fetch("/api/jellyfin");
        const data = await response.json();

        const status = document.getElementById("jellyfinStatus");
        const details = document.getElementById("jellyfinDetails");
        const nowPlaying = document.getElementById("nowPlaying");

        if (!data.online) {
            status.textContent = "● OFFLINE";
            status.className = "value bad";
            details.textContent = data.error || "Jellyfin unavailable";
            nowPlaying.innerHTML =
                `<div class="details">Jellyfin is offline.</div>`;
            return;
        }

        status.textContent = "● ONLINE";
        status.className = "value good";

        details.textContent =
            `${data.name} • Version ${data.version} • ${data.active_streams} active stream(s)`;

        if (data.sessions.length === 0) {
            nowPlaying.innerHTML =
                `<div class="value">Nothing Playing</div>
                 <div class="details">No active Jellyfin streams</div>`;
            return;
        }

        nowPlaying.innerHTML = "";

        data.sessions.forEach(session => {
            let methodClass =
                session.transcoding ? "warning" : "good";

            let transcodeInfo = "";

            if (session.transcoding && session.transcode) {
                transcodeInfo = `
                    <div class="details">
                        ${session.transcode.video_codec} •
                        ${session.transcode.width || "?"}x${session.transcode.height || "?"} •
                        ${session.transcode.fps || 0} FPS
                    </div>
                `;
            }

            nowPlaying.innerHTML += `
                <div class="stream">
                    <div class="stream-top">
                        <div>
                            <div class="stream-title">${session.title}</div>
                            <div class="details">${session.subtitle || ""}</div>
                        </div>

                        <strong>${session.paused ? "⏸ PAUSED" : "▶ PLAYING"}</strong>
                    </div>

                    <div class="details">
                        ${session.user} • ${session.device} • ${session.client}
                    </div>

                    <div class="method ${methodClass}">
                        ${session.transcoding ? "🔥 " : "✓ "}
                        ${session.method}
                    </div>

                    ${transcodeInfo}

                    <div class="progress">
                        <div class="bar">
                            <div class="fill" style="width:${session.progress}%"></div>
                        </div>

                        <div class="details">${session.progress}% watched</div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
    }
}

updateSystem();
updateJellyfin();

setInterval(updateSystem, 2000);
setInterval(updateJellyfin, 3000);
</script>

</body>
</html>
